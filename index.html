<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="レシートスキャン">
<title>レシートスキャナー</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue: #0A84FF;
    --blue-dark: #0060DF;
    --bg: #1C1C1E;
    --bg2: #2C2C2E;
    --bg3: #3A3A3C;
    --text: #FFFFFF;
    --text2: #EBEBF5CC;
    --text3: #EBEBF599;
    --sep: #38383A;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    touch-action: manipulation;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }

  .screen {
    display: none;
    flex-direction: column;
    height: 100%;
  }
  .screen.active { display: flex; }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px 8px;
    min-height: 52px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--sep);
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header-btn {
    background: none;
    border: none;
    color: var(--blue);
    font-size: 17px;
    font-family: inherit;
    padding: 8px 4px;
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Capture screen ── */
  #screen-capture {
    justify-content: flex-start;
  }
  .capture-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px 24px;
  }
  .capture-icon {
    width: 96px;
    height: 96px;
    background: var(--bg3);
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }
  .capture-title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.4px;
  }
  .capture-sub {
    font-size: 15px;
    color: var(--text3);
    text-align: center;
    line-height: 1.5;
  }
  .btn-primary {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 600;
    font-family: inherit;
    padding: 16px 32px;
    min-height: 54px;
    width: 100%;
    max-width: 320px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.75; }
  .btn-secondary {
    background: var(--bg3);
    color: var(--text);
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 500;
    font-family: inherit;
    padding: 16px 32px;
    min-height: 54px;
    width: 100%;
    max-width: 320px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .btn-secondary:active { opacity: 0.7; }

  /* ── Adjust screen ── */
  #screen-adjust {
    background: #000;
  }
  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #canvas-adjust {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    touch-action: none;
  }
  .adjust-footer {
    background: var(--bg);
    padding: 16px;
    display: flex;
    gap: 12px;
    border-top: 0.5px solid var(--sep);
  }
  .adjust-footer .btn-primary,
  .adjust-footer .btn-secondary {
    max-width: none;
    flex: 1;
    padding: 14px 8px;
  }

  /* ── Result screen ── */
  #screen-result {
    background: #000;
  }
  .result-canvas-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
  }
  #canvas-result {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .result-footer {
    background: var(--bg);
    padding: 12px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-top: 0.5px solid var(--sep);
  }
  .result-btns {
    display: flex;
    gap: 12px;
  }
  .result-btns .btn-primary,
  .result-btns .btn-secondary {
    max-width: none;
    flex: 1;
    padding: 14px 8px;
    font-size: 15px;
  }
  .hint {
    font-size: 12px;
    color: var(--text3);
    text-align: center;
    line-height: 1.5;
  }

  /* ── Loading overlay ── */
  #cv-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
    backdrop-filter: blur(8px);
  }
  #cv-overlay.hidden { display: none; }
  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid var(--bg3);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cv-loading-text {
    font-size: 15px;
    color: var(--text2);
  }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: calc(var(--safe-bottom) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg3);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  input[type=file] { display: none; }
</style>
</head>
<body>
<div id="app">

  <!-- Capture -->
  <div id="screen-capture" class="screen active">
    <div class="header">
      <span></span>
      <h1>レシートスキャナー</h1>
      <span></span>
    </div>
    <div class="capture-body">
      <div class="capture-icon">🧾</div>
      <div class="capture-title">レシートを撮影</div>
      <div class="capture-sub">カメラでレシートを撮影するか、<br>ライブラリから選択してください</div>
      <button class="btn-primary" onclick="triggerCamera()">📷 カメラで撮影</button>
      <button class="btn-secondary" onclick="triggerLibrary()">🖼️ ライブラリから選択</button>
    </div>
  </div>

  <!-- Adjust -->
  <div id="screen-adjust" class="screen">
    <div class="header">
      <button class="header-btn" onclick="goCapture()">戻る</button>
      <h1>コーナー調整</h1>
      <span style="min-width:44px"></span>
    </div>
    <div class="canvas-wrap">
      <canvas id="canvas-adjust"></canvas>
    </div>
    <div class="adjust-footer">
      <button class="btn-secondary" onclick="goCapture()">やり直し</button>
      <button class="btn-primary" onclick="applyPerspective()">補正する →</button>
    </div>
  </div>

  <!-- Result -->
  <div id="screen-result" class="screen">
    <div class="header">
      <button class="header-btn" onclick="goAdjust()">戻る</button>
      <h1>補正結果</h1>
      <span style="min-width:44px"></span>
    </div>
    <div class="result-canvas-wrap">
      <canvas id="canvas-result"></canvas>
    </div>
    <div class="result-footer">
      <div class="result-btns">
        <button id="btn-share" class="btn-primary" onclick="shareImage()">📤 共有</button>
        <button id="btn-download" class="btn-secondary" onclick="downloadImage()">📥 保存</button>
      </div>
      <div class="hint" id="save-hint">共有シートから「画像を保存」を選ぶとカメラロールに保存されます</div>
    </div>
  </div>

</div>

<!-- Loading overlay -->
<div id="cv-overlay">
  <div class="spinner" id="cv-spinner"></div>
  <div class="cv-loading-text" id="cv-msg">OpenCV 読み込み中...</div>
  <button id="cv-retry-btn" class="btn-secondary" style="display:none;max-width:200px;margin-top:8px" onclick="retryLoadCV()">再試行</button>
</div>

<div id="toast"></div>

<input type="file" id="input-camera" accept="image/*" capture="environment">
<input type="file" id="input-library" accept="image/*">

<script>
// ── State ──
let srcImage = null;
let corners = [];       // [{x,y}, ...] 4 points in canvas coords
let dragIdx = -1;
let adjustScale = 1;
let adjustOffX = 0;
let adjustOffY = 0;
let cvReady = false;

// ── OpenCV load ──
function onCvReady() {
  cvReady = true;
  document.getElementById('cv-overlay').classList.add('hidden');
}

function waitForCv() {
  const timer = setInterval(() => {
    if (typeof cv !== 'undefined' && typeof cv.Mat === 'function') {
      clearInterval(timer);
      onCvReady();
    }
  }, 200);
}

function retryLoadCV() {
  document.getElementById('cv-msg').textContent = 'OpenCV 読み込み中...';
  document.getElementById('cv-retry-btn').style.display = 'none';
  document.getElementById('cv-spinner').style.display = '';
  loadOpenCV();
}

function loadOpenCV() {
  const s = document.createElement('script');
  s.async = true;
  s.src = 'https://cdn.jsdelivr.net/npm/@techstark/opencv-js@4.8.0-release.1/dist/opencv.js';
  s.onload = () => waitForCv();
  s.onerror = () => {
    document.getElementById('cv-msg').textContent = 'OpenCV 読み込み失敗。ネット接続を確認して再試行してください。';
    document.getElementById('cv-spinner').style.display = 'none';
    document.getElementById('cv-retry-btn').style.display = '';
  };
  document.head.appendChild(s);
}
loadOpenCV();

// ── Screen navigation ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goCapture() { showScreen('screen-capture'); }
function goAdjust()  { showScreen('screen-adjust'); }
function goResult()  { showScreen('screen-result'); }

// ── File inputs ──
document.getElementById('input-camera').addEventListener('change', onFileSelected);
document.getElementById('input-library').addEventListener('change', onFileSelected);

function triggerCamera()  { document.getElementById('input-camera').click(); }
function triggerLibrary() { document.getElementById('input-library').click(); }

function onFileSelected(e) {
  const file = e.target.files[0];
  e.target.value = '';
  if (!file) return;
  if (!cvReady) { toast('OpenCV がまだ読み込まれていません'); return; }
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = () => {
    URL.revokeObjectURL(url);
    srcImage = img;
    showScreen('screen-adjust');
    requestAnimationFrame(() => initAdjust(img));
  };
  img.src = url;
}

// ── Adjust screen setup ──
function initAdjust(img) {
  const canvas = document.getElementById('canvas-adjust');
  const wrap = canvas.parentElement;
  const maxW = wrap.clientWidth;
  const maxH = wrap.clientHeight;
  const scale = Math.min(maxW / img.width, maxH / img.height, 1);
  const dw = Math.round(img.width * scale);
  const dh = Math.round(img.height * scale);
  canvas.width  = dw;
  canvas.height = dh;
  adjustScale = scale;
  adjustOffX = (maxW - dw) / 2;
  adjustOffY = (maxH - dh) / 2;

  const detected = detectReceipt(img, dw, dh);
  corners = detected;
  drawHandles(canvas, img);
}

// ── Edge detection ──
function detectReceipt(img, dw, dh) {
  const fallback = [
    {x: dw*0.05, y: dh*0.05},
    {x: dw*0.95, y: dh*0.05},
    {x: dw*0.95, y: dh*0.95},
    {x: dw*0.05, y: dh*0.95},
  ];

  // 検出は600px以下にリサイズして処理
  const MAX = 600;
  const sc  = Math.min(MAX / dw, MAX / dh, 1);
  const tw  = Math.round(dw * sc);
  const th  = Math.round(dh * sc);

  let src, gray, binary, kernel, contours, hierarchy;
  try {
    src      = cv.imread(drawImgToOffscreen(img, tw, th));
    gray     = new cv.Mat();
    binary   = new cv.Mat();
    contours = new cv.MatVector();
    hierarchy = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, gray, new cv.Size(7, 7), 0);

    // OTSUで自動二値化（明るいレシート vs 暗い背景）
    cv.threshold(gray, binary, 0, 255, cv.THRESH_BINARY + cv.THRESH_OTSU);

    // 背景が明るい場合は反転（レシートを白に）
    const mean = cv.mean(binary);
    if (mean[0] > 127) cv.bitwise_not(binary, binary);

    // モルフォロジーでノイズ除去・穴埋め
    kernel = cv.Mat.ones(5, 5, cv.CV_8U);
    cv.morphologyEx(binary, binary, cv.MORPH_CLOSE, kernel);
    cv.morphologyEx(binary, binary, cv.MORPH_OPEN,  kernel);

    cv.findContours(binary, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);

    // 最大面積の輪郭を選択
    let maxArea = 0, maxIdx = -1;
    for (let i = 0; i < contours.size(); i++) {
      const a = cv.contourArea(contours.get(i));
      if (a > maxArea) { maxArea = a; maxIdx = i; }
    }

    if (maxIdx < 0 || maxArea < tw * th * 0.08) return fallback;

    const cnt = contours.get(maxIdx);

    // 凸包で滑らかな輪郭を取得
    const hull = new cv.Mat();
    cv.convexHull(cnt, hull, false, true);

    // 複数epsilonで4頂点近似
    const peri = cv.arcLength(hull, true);
    let bestQuad = null;
    for (const eps of [0.02, 0.04, 0.06, 0.08, 0.1, 0.15]) {
      const approx = new cv.Mat();
      cv.approxPolyDP(hull, approx, eps * peri, true);
      if (approx.rows === 4) { bestQuad = approx; break; }
      approx.delete();
    }
    hull.delete();

    if (!bestQuad) return fallback;

    const inv = dw / tw;
    const pts = [];
    for (let i = 0; i < 4; i++) {
      pts.push({
        x: bestQuad.data32S[i*2]   * inv,
        y: bestQuad.data32S[i*2+1] * inv,
      });
    }
    bestQuad.delete();
    return pts;
  } catch(e) {
    return fallback;
  } finally {
    if (src)       src.delete();
    if (gray)      gray.delete();
    if (binary)    binary.delete();
    if (kernel)    kernel.delete();
    if (contours)  contours.delete();
    if (hierarchy) hierarchy.delete();
  }
}

function drawImgToOffscreen(img, w, h) {
  const oc = document.createElement('canvas');
  oc.width = w; oc.height = h;
  oc.getContext('2d').drawImage(img, 0, 0, w, h);
  return oc;
}

// ── Draw handles ──
function drawHandles(canvas, img) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

  // polygon
  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y);
  for (let i = 1; i < corners.length; i++) ctx.lineTo(corners[i].x, corners[i].y);
  ctx.closePath();
  ctx.strokeStyle = 'rgba(10,132,255,0.85)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = 'rgba(10,132,255,0.12)';
  ctx.fill();

  // handles
  const R = 16;
  corners.forEach((p, i) => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, R, 0, Math.PI*2);
    ctx.fillStyle = '#0A84FF';
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  });
}

// ── Touch drag ──
const adjustCanvas = document.getElementById('canvas-adjust');

adjustCanvas.addEventListener('touchstart', onTouchStart, {passive: false});
adjustCanvas.addEventListener('touchmove',  onTouchMove,  {passive: false});
adjustCanvas.addEventListener('touchend',   onTouchEnd,   {passive: false});

function canvasPos(canvas, touch) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (touch.clientX - r.left) * (canvas.width  / r.width),
    y: (touch.clientY - r.top)  * (canvas.height / r.height),
  };
}

function onTouchStart(e) {
  e.preventDefault();
  const pos = canvasPos(this, e.touches[0]);
  let minD = Infinity;
  corners.forEach((p, i) => {
    const d = Math.hypot(p.x - pos.x, p.y - pos.y);
    if (d < minD) { minD = d; dragIdx = i; }
  });
  if (minD > 60) dragIdx = -1;
}

function onTouchMove(e) {
  e.preventDefault();
  if (dragIdx < 0) return;
  const pos = canvasPos(this, e.touches[0]);
  corners[dragIdx] = {
    x: Math.max(0, Math.min(this.width,  pos.x)),
    y: Math.max(0, Math.min(this.height, pos.y)),
  };
  drawHandles(this, srcImage);
}

function onTouchEnd(e) {
  e.preventDefault();
  dragIdx = -1;
}

// ── Order corners ──
function orderCorners(pts) {
  const cx = pts.reduce((s, p) => s + p.x, 0) / 4;
  const cy = pts.reduce((s, p) => s + p.y, 0) / 4;
  const tl = pts.filter(p => p.x < cx && p.y < cy);
  const tr = pts.filter(p => p.x >= cx && p.y < cy);
  const br = pts.filter(p => p.x >= cx && p.y >= cy);
  const bl = pts.filter(p => p.x < cx && p.y >= cy);
  const pick = (arr, fallback) => arr.length ? arr[0] : fallback;
  return [
    pick(tl, {x:0, y:0}),
    pick(tr, {x:pts[0].x, y:0}),
    pick(br, {x:pts[0].x, y:pts[0].y}),
    pick(bl, {x:0, y:pts[0].y}),
  ];
}

function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

// ── Perspective correction ──
function applyPerspective() {
  if (!cvReady) { toast('OpenCV がまだ準備中です'); return; }

  const scale = adjustScale;
  const rawPts = corners.map(p => ({ x: p.x / scale, y: p.y / scale }));
  const [tl, tr, br, bl] = orderCorners(rawPts);

  const wTop    = dist(tl, tr);
  const wBottom = dist(bl, br);
  const hLeft   = dist(tl, bl);
  const hRight  = dist(tr, br);
  const outW = Math.round(Math.max(wTop, wBottom));
  const outH = Math.round(Math.max(hLeft, hRight));

  let srcMat, dstMat, srcPts, dstPts, M;
  try {
    const oc = drawImgToOffscreen(srcImage, srcImage.width, srcImage.height);
    srcMat = cv.imread(oc);

    srcPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
      tl.x, tl.y, tr.x, tr.y, br.x, br.y, bl.x, bl.y,
    ]);
    dstPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
      0, 0, outW, 0, outW, outH, 0, outH,
    ]);
    M = cv.getPerspectiveTransform(srcPts, dstPts);
    dstMat = new cv.Mat();
    cv.warpPerspective(srcMat, dstMat, M, new cv.Size(outW, outH), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar());

    const resultCanvas = document.getElementById('canvas-result');
    resultCanvas.width  = outW;
    resultCanvas.height = outH;
    cv.imshow(resultCanvas, dstMat);

    goResult();
    updateShareHint();
  } catch(e) {
    toast('補正に失敗しました: ' + e.message);
  } finally {
    if (srcMat) srcMat.delete();
    if (dstMat) dstMat.delete();
    if (srcPts) srcPts.delete();
    if (dstPts) dstPts.delete();
    if (M)      M.delete();
  }
}

function updateShareHint() {
  const shareAvail = !!(navigator.canShare);
  document.getElementById('btn-share').style.display = shareAvail ? '' : 'none';
  document.getElementById('save-hint').textContent = shareAvail
    ? '共有シートから「画像を保存」を選ぶとカメラロールに保存されます'
    : '「保存」をタップするとファイルに保存されます';
}

// ── Save / Share ──
function getResultBlob() {
  return new Promise(resolve => {
    document.getElementById('canvas-result').toBlob(resolve, 'image/jpeg', 0.92);
  });
}

async function shareImage() {
  try {
    const blob = await getResultBlob();
    const file = new File([blob], 'receipt.jpg', { type: 'image/jpeg' });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: 'レシート' });
    } else {
      downloadImage();
    }
  } catch(e) {
    if (e.name !== 'AbortError') toast('共有できませんでした');
  }
}

async function downloadImage() {
  const blob = await getResultBlob();
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'receipt_' + Date.now() + '.jpg';
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 10000);
  toast('保存しました');
}

// ── Toast ──
function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), duration);
}
</script>
